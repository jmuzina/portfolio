<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
<div class="app-container">
  <ng-container *ngIf="!loading; else appLoading">
    <jm-header></jm-header>
    <div class="sidebar-and-page-contents">
      <jm-sidebar *ngIf="!vcs.sidebarCollapsed"></jm-sidebar>
      <div class="page-contents">
        <router-outlet
          *ngIf="!mnts.activeMaintenanceEvent && !inits.initializationError"
        ></router-outlet>
        <jm-page-not-found
          *ngIf="inits.initializationError && !mnts.activeMaintenanceEvent"
        ></jm-page-not-found>

        <jm-maintenance-message
          *ngIf="mnts.activeMaintenanceEvent"
          [event]="mnts.activeMaintenanceEvent"
        ></jm-maintenance-message>

        <jm-footer></jm-footer>
      </div>
    </div>
  </ng-container>
  <ng-template #appLoading>
    <jm-loading-spinner
      [showMessage]="false"
      [useDots]="false"
    ></jm-loading-spinner>
  </ng-template>
</div>
